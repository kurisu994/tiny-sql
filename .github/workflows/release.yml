name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bundle:
    name: ${{ matrix.label }} bundle
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: darwin
            arch: arm64
            runner: macos-15
            bundles: dmg,app
          - label: macOS x64
            os: darwin
            arch: x64
            runner: macos-15-intel
            bundles: dmg,app
          - label: Windows x64
            os: windows
            arch: x64
            runner: windows-latest
            bundles: nsis
          - label: Linux x64
            os: linux
            arch: x64
            runner: ubuntu-22.04
            bundles: appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget \
            xdg-utils

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      - name: Normalize updater artifact names
        if: matrix.os == 'darwin'
        run: |
          shopt -s nullglob
          for file in target/release/bundle/macos/*.app.tar.gz; do
            renamed="${file%.app.tar.gz}_${{ matrix.arch }}.app.tar.gz"
            mv "$file" "$renamed"
            if [ -f "$file.sig" ]; then
              mv "$file.sig" "$renamed.sig"
            fi
          done

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: tiny-sql-${{ matrix.os }}-${{ matrix.arch }}-bundle
          path: |
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.tar.gz
            target/release/bundle/**/*.sig
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.AppImage
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download bundle artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes_file="release-notes.md"

          extract_notes() {
            local heading="$1"
            awk -v heading="$heading" '
              index($0, heading) == 1 { in_section = 1; found = 1; next }
              in_section && /^## \[/ { exit }
              in_section { print }
              END { if (!found) exit 1 }
            ' CHANGELOG.md
          }

          if ! extract_notes "## [$version]" > "$notes_file"; then
            case "$version" in
              *-alpha*|*-beta*|*-rc*) extract_notes "## [Unreleased]" > "$notes_file" || echo "tiny-sql ${GITHUB_REF_NAME}" > "$notes_file" ;;
              *) echo "tiny-sql ${GITHUB_REF_NAME}" > "$notes_file" ;;
            esac
          fi

          perl -0pi -e 's/\A\s+//' "$notes_file"
          if [ ! -s "$notes_file" ] || ! grep -q '[^[:space:]-]' "$notes_file"; then
            echo "tiny-sql ${GITHUB_REF_NAME}" > "$notes_file"
          fi

      - name: Collect release assets
        run: |
          mkdir -p dist-assets
          find dist -type f \( \
            -name '*.dmg' -o \
            -name '*.tar.gz' -o \
            -name '*.sig' -o \
            -name '*.exe' -o \
            -name '*.AppImage' \
          \) -exec cp '{}' dist-assets/ \;
          find dist-assets -maxdepth 1 -type f -print | sort

      - name: Generate updater manifest
        run: |
          case "${GITHUB_REF_NAME}" in
            *-alpha*|*-beta*|*-rc*)
              echo "Skip latest.json for prerelease ${GITHUB_REF_NAME}"
              exit 0
              ;;
          esac

          python3 - <<'PY'
          import datetime
          import json
          import os
          import pathlib
          import sys

          dist = pathlib.Path("dist-assets")
          tag = os.environ["GITHUB_REF_NAME"]
          version = tag[1:] if tag.startswith("v") else tag
          repo = os.environ["GITHUB_REPOSITORY"]
          notes = pathlib.Path("release-notes.md").read_text(encoding="utf-8").strip()

          def find_update_asset(platform, patterns):
              matches = []
              for pattern in patterns:
                  matches.extend(sorted(dist.glob(pattern)))
              matches = [p for p in matches if p.is_file()]
              if not matches:
                  print(f"missing updater artifact for {platform}", file=sys.stderr)
                  print("available files:", file=sys.stderr)
                  for path in sorted(dist.iterdir()):
                      print(f"  {path.name}", file=sys.stderr)
                  sys.exit(1)
              return matches[0]

          platforms = {}
          for platform, patterns in {
              "darwin-aarch64": ["*aarch64*.tar.gz", "*arm64*.tar.gz"],
              "darwin-x86_64": ["*x86_64*.tar.gz", "*x64*.tar.gz"],
              "windows-x86_64": ["*.exe"],
              "linux-x86_64": ["*.AppImage.tar.gz"],
          }.items():
              asset = find_update_asset(platform, patterns)
              sig = pathlib.Path(str(asset) + ".sig")
              if not sig.exists():
                  print(f"missing updater signature for {asset.name}", file=sys.stderr)
                  sys.exit(1)
              platforms[platform] = {
                  "signature": sig.read_text(encoding="utf-8").strip(),
                  "url": f"https://github.com/{repo}/releases/download/{tag}/{asset.name}",
              }

          manifest = {
              "version": version,
              "notes": notes,
              "pub_date": datetime.datetime.now(datetime.timezone.utc)
              .replace(microsecond=0)
              .isoformat()
              .replace("+00:00", "Z"),
              "platforms": platforms,
          }
          (dist / "latest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          release_flags=()
          case "${GITHUB_REF_NAME}" in
            *-alpha*|*-beta*|*-rc*) release_flags+=(--prerelease --latest=false) ;;
          esac

          release_assets=(dist-assets/*.dmg dist-assets/*.tar.gz dist-assets/*.sig dist-assets/*.exe dist-assets/*.AppImage)
          if [ -f dist-assets/latest.json ]; then
            release_assets+=(dist-assets/latest.json)
          fi

          if [ "${#release_assets[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi

          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --verify-tag \
            "${release_flags[@]}" \
            "${release_assets[@]}"
